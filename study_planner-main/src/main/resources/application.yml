# Server
server:
  port: 8080

# Spring
spring:
  application:
    name: study-planner

  datasource:
    url: jdbc:mysql://localhost:3306/study_planner?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_database_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    resources:
      static-locations: classpath:/static/

  session:
    store-type: none
    timeout: 30m

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.studyplanner.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

llm:
  api:
    provider: dashscope
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: your_llm_api_key
    model: qwen-turbo
    max-tokens: 8192
    temperature: 0.5
    mock-mode: true
    available-models:
      - qwen-plus
      - qwen-turbo
      - qwen-max
      - qwen-long

file:
  upload:
    path: uploads
    url-prefix: /uploads

spring.servlet.multipart:
  enabled: true
  max-file-size: 5MB
  max-request-size: 10MB

logging:
  level:
    com.studyplanner: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
